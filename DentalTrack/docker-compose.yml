services:
  db:
    image: postgres:15-alpine
    container_name: dentaltrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dentaltrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dentaltrack_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dentaltrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - dentaltrack_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentaltrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentaltrack_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dentaltrack}:${POSTGRES_PASSWORD:-dentaltrack_secret}@db:5432/${POSTGRES_DB:-dentaltrack}
      PDF_OUTPUT_DIR: /app/reports
    volumes:
      - pdf_reports:/app/reports
      - ./backend:/app   # hot-reload en local (quitar en producción)
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dentaltrack_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dentaltrack_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app      # hot-reload en local (quitar en producción)
      - /app/node_modules    # anula la carpeta node_modules del host
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - dentaltrack_net

volumes:
  postgres_data:
    driver: local
  pdf_reports:
    driver: local

networks:
  dentaltrack_net:
    driver: bridge
