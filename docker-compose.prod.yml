services:
  db:
    image: postgres:15-alpine
    container_name: dentaltrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dentaltrack_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentaltrack_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PDF_OUTPUT_DIR: /app/reports
    volumes:
      - pdf_reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dentaltrack_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dentaltrack_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: https://api.dentaltrack.opocnp.es
    depends_on:
      - backend
    networks:
      - dentaltrack_net

volumes:
  postgres_data:
    driver: local
  pdf_reports:
    driver: local

networks:
  dentaltrack_net:
    driver: bridge
